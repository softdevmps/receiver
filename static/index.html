<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sharew</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d; color: #e0e0e0;
      font-family: ui-monospace, monospace;
      height: 100vh; display: flex; flex-direction: column;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 14px; background: #141414;
      border-bottom: 1px solid #222; flex-shrink: 0;
    }
    #toolbar h1 { font-size: 13px; font-weight: 700; color: #7dd3fc; letter-spacing: .5px; }
    #status {
      font-size: 11px; padding: 2px 9px; border-radius: 999px; background: #222;
    }
    #status.live       { background: #14532d; color: #4ade80; }
    #status.offline    { background: #450a0a; color: #f87171; }
    #status.connecting { background: #1e293b; color: #94a3b8; }
    #layer-badge {
      font-size: 11px; padding: 2px 9px; border-radius: 999px;
      background: #1e3a5f; color: #7dd3fc; display: none;
    }
    #fps-counter { font-size: 11px; color: #4b5563; margin-left: auto; }
    #diag-toggle {
      font-size: 11px; color: #6b7280; cursor: pointer; padding: 2px 8px;
      border: 1px solid #333; border-radius: 4px; background: none;
    }
    #diag-toggle:hover { color: #e0e0e0; border-color: #555; }

    /* ── Token bar ── */
    #token-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; background: #111;
      border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
    }
    #token-bar label { font-size: 12px; color: #9ca3af; }
    #token-input {
      flex: 1; max-width: 320px; background: #1f1f1f;
      border: 1px solid #333; border-radius: 4px;
      color: #e0e0e0; padding: 4px 8px; font-size: 13px; font-family: inherit;
    }
    #connect-btn {
      background: #1d4ed8; color: #fff; border: none;
      border-radius: 4px; padding: 4px 14px; font-size: 13px; cursor: pointer;
    }
    #connect-btn:hover { background: #2563eb; }

    /* ── Main area ── */
    #main { flex: 1; display: flex; overflow: hidden; }

    #canvas-wrap {
      flex: 1; display: flex; align-items: center;
      justify-content: center; overflow: hidden; position: relative;
    }
    canvas { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    #placeholder {
      position: absolute; text-align: center; color: #374151; font-size: 13px;
    }
    #placeholder span { display: block; font-size: 44px; margin-bottom: 10px; }

    /* ── Diagnostics panel ── */
    #diag-panel {
      width: 320px; background: #0a0a0a; border-left: 1px solid #1e1e1e;
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    #diag-panel.hidden { display: none; }
    #diag-header {
      padding: 8px 12px; font-size: 11px; color: #6b7280;
      border-bottom: 1px solid #1e1e1e; display: flex;
      justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    #diag-header span { color: #374151; font-size: 10px; }
    #diag-log {
      flex: 1; overflow-y: auto; padding: 6px 0;
      display: flex; flex-direction: column-reverse;
    }
    .ev {
      padding: 3px 12px; font-size: 10.5px; line-height: 1.5;
      border-bottom: 1px solid #111;
    }
    .ev .time { color: #374151; margin-right: 6px; }
    .ev .layer { font-weight: 700; margin-right: 5px; }
    .ev .layer-A { color: #60a5fa; }
    .ev .layer-B { color: #c084fc; }
    .ev .layer-C { color: #fbbf24; }
    .ev .layer-D { color: #f87171; }
    .ev.OK    .msg { color: #4ade80; }
    .ev.INFO  .msg { color: #9ca3af; }
    .ev.WARN  .msg { color: #fbbf24; }
    .ev.ERROR .msg { color: #f87171; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>sharew</h1>
  <div id="status" class="connecting">connecting…</div>
  <div id="layer-badge">Layer A</div>
  <div id="fps-counter">— fps</div>
  <button id="diag-toggle">diagnostics</button>
</div>

<div id="token-bar">
  <label for="token-input">Token:</label>
  <input id="token-input" type="password" placeholder="Enter access token" />
  <button id="connect-btn">Connect</button>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="screen"></canvas>
    <div id="placeholder"><span>📡</span>Waiting for stream…</div>
  </div>

  <div id="diag-panel" class="hidden">
    <div id="diag-header">
      DIAGNOSTICS
      <span id="diag-count">0 events</span>
    </div>
    <div id="diag-log"></div>
  </div>
</div>

<script>
  const canvas    = document.getElementById('screen');
  const ctx       = canvas.getContext('2d');
  const statusEl  = document.getElementById('status');
  const fpsEl     = document.getElementById('fps-counter');
  const layerBadge= document.getElementById('layer-badge');
  const placeholder = document.getElementById('placeholder');
  const tokenInput  = document.getElementById('token-input');
  const connectBtn  = document.getElementById('connect-btn');
  const diagPanel   = document.getElementById('diag-panel');
  const diagLog     = document.getElementById('diag-log');
  const diagCount   = document.getElementById('diag-count');
  const diagToggle  = document.getElementById('diag-toggle');

  if (location.hash) tokenInput.value = location.hash.slice(1);

  let ws = null, frameCount = 0, lastFpsTime = performance.now();
  let eventTotal = 0, activeLayer = null;

  // ── Diagnostics toggle ──
  diagToggle.addEventListener('click', () => {
    diagPanel.classList.toggle('hidden');
    diagToggle.textContent = diagPanel.classList.contains('hidden') ? 'diagnostics' : 'hide diag';
  });

  // ── Status ──
  function setStatus(cls, text) { statusEl.className = cls; statusEl.textContent = text; }

  // ── Telemetry event renderer ──
  function addEvent(ev) {
    const div = document.createElement('div');
    div.className = `ev ${ev.level}`;

    const ts = new Date(ev.ts * 1000).toLocaleTimeString('en', { hour12: false });
    div.innerHTML =
      `<span class="time">${ts}</span>` +
      `<span class="layer layer-${ev.layer}">[${ev.layer}]</span>` +
      `<span class="msg">${ev.message}</span>`;

    diagLog.prepend(div);
    eventTotal++;
    diagCount.textContent = `${eventTotal} events`;

    // Update layer badge
    if (ev.level === 'OK' && ev.layer && ev.layer !== '—') {
      activeLayer = ev.layer;
      layerBadge.textContent = `Layer ${ev.layer}`;
      layerBadge.style.display = '';
    }
  }

  // ── WebSocket connection ──
  function connect() {
    if (ws) { ws.close(); ws = null; }

    const token = tokenInput.value.trim();
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const url   = `${proto}://${location.host}/ws/viewer${token ? '?token=' + encodeURIComponent(token) : ''}`;

    setStatus('connecting', 'connecting…');
    ws = new WebSocket(url);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => setStatus('connecting', 'connected — waiting for sender');

    ws.onmessage = (evt) => {
      if (typeof evt.data === 'string') {
        // Telemetry JSON
        try { addEvent(JSON.parse(evt.data)); } catch (_) {}
        return;
      }

      // Binary → video frame
      const blob = new Blob([evt.data], { type: 'image/jpeg' });
      const url  = URL.createObjectURL(blob);
      const img  = new Image();
      img.onload = () => {
        if (canvas.width !== img.width || canvas.height !== img.height) {
          canvas.width = img.width; canvas.height = img.height;
        }
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        placeholder.style.display = 'none';
        setStatus('live', 'live');
        frameCount++;
      };
      img.src = url;
    };

    ws.onclose = (e) => {
      const msg = e.code === 403 ? 'invalid token' : 'disconnected';
      setStatus('offline', msg);
      placeholder.style.display = '';
      layerBadge.style.display = 'none';
      if (e.code !== 403) setTimeout(connect, 3000);
    };

    ws.onerror = () => setStatus('offline', 'error');
  }

  connectBtn.addEventListener('click', connect);
  tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });

  // ── FPS counter ──
  setInterval(() => {
    const now = performance.now();
    const fps = (frameCount / ((now - lastFpsTime) / 1000)).toFixed(1);
    fpsEl.textContent = `${fps} fps`;
    frameCount = 0; lastFpsTime = now;
  }, 2000);

  if (tokenInput.value) connect();
</script>
</body>
</html>
